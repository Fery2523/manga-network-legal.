<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manga Network Legal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: white; }
        .manga-card { background-color: #1e1e1e; border: none; border-radius: 10px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">Manga Network</a>
        </div>
    </nav>

    <div class="container mt-4">
        <h1>Bienvenido, {{ nombre_usuario }}</h1>
        <p>Explora tus mangas favoritos de forma legal.</p>
        
        <div class="row">
            <div class="col-6 col-md-4 mb-3">
                <div class="card manga-card text-white p-2">
                    <img src="https://via.placeholder.com/150" class="card-img-top" alt="Portada">
                    <div class="card-body">
                        <h5 class="card-title">Próximamente</h5>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
